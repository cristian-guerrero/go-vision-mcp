name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go vet ./...
      - run: go test -v -count=1 ./internal/...

  build:
    needs: test
    if: github.event_name == 'push'
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64
          - os: windows
            arch: arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Determine build version
        id: version
        shell: bash
        run: |
          BUILD_NUMBER="$(git rev-list --count HEAD)"
          echo "name=b${BUILD_NUMBER}" >> $GITHUB_OUTPUT
      - name: Build
        shell: bash
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          ext=""
          if [ "${{ matrix.os }}" = "windows" ]; then ext=".exe"; fi
          go build -ldflags="-s -w -X github.com/cristian-guerrero/go-vision-mcp/internal/version.Version=${{ steps.version.outputs.name }}" \
            -o "vision-mcp-${{ matrix.os }}-${{ matrix.arch }}${ext}" .
      - uses: actions/upload-artifact@v4
        with:
          name: vision-mcp-${{ matrix.os }}-${{ matrix.arch }}
          path: vision-mcp-${{ matrix.os }}-${{ matrix.arch }}*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Determine tag
        id: tag
        shell: bash
        run: |
          BUILD_NUMBER="$(git rev-list --count HEAD)"
          echo "name=b${BUILD_NUMBER}" >> $GITHUB_OUTPUT
      - uses: actions/download-artifact@v4
        with:
          pattern: vision-mcp-*
          merge-multiple: true
          path: release
      - name: Generate checksums
        working-directory: ./release
        run: sha256sum * > checksums.txt
      - name: Create Release
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "$(git log -1 --format='%s')"
          gh release upload "$TAG" release/* --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
